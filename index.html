<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অটো-কোড জেনারেটর সহ পরীক্ষার খাতা</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }

        /* --- Print Control Panel (Hidden during Print) --- */
        .print-controls {
            background-color: #fff;
            padding: 15px 25px;
            border: 2px solid #d81b60;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 210mm;
            box-sizing: border-box;
        }
        .print-controls input {
            padding: 8px;
            font-size: 16px;
            width: 100px;
            text-align: center;
            margin: 0 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .print-controls button {
            padding: 8px 15px;
            font-size: 16px;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .print-controls button:hover {
            background-color: #c2185b;
        }

        /* --- Page Formatting --- */
        #print-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .a4-page {
            width: 100%;
            max-width: 210mm;
            background-color: #fce4ec;
            border: 1px solid #ccc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            /* হাইট সামান্য কমানো হয়েছে যেন পরের পেজে না যায় */
            min-height: 290mm; 
            margin-bottom: 20px; 
        }

        .white-box {
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 20px 25px;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .part-1 { flex: 0 0 auto; padding: 20px 20px 10px 20px; }
        .part-2 { flex: 1 1 auto; padding: 10px 20px 20px 20px; }

        .cut-line {
            width: 100%;
            text-align: center;
            border-top: 2px dashed #ffffff;
            line-height: 0.1em;
            margin: 10px 0;
            position: relative;
        }
        .cut-line span {
            background-color: #d81b60;
            padding: 0 15px;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 15px;
            gap: 10px;
        }
        
        .header-left { text-align: left; }
        .header-left h1 { margin: 0; font-size: 20px; color: #222; }

        .secret-code {
            border: 2px solid #000;
            background-color: #e3f2fd;
            padding: 8px 15px;
            border-radius: 5px;
            text-align: center;
            font-family: 'Courier New', monospace;
            flex-shrink: 0;
        }
        .secret-code-title {
            font-size: 12px;
            margin-bottom: 2px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
            color: #000;
        }
        .auto-code-display {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #000;
        }

        .badge {
            display: inline-block;
            background-color: #000;
            color: #fff;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .badge-red { background-color: #d32f2f; }

        .form-row {
            display: flex;
            margin-bottom: 12px;
            font-size: 16px;
            align-items: flex-end;
        }
        .form-label { font-weight: bold; white-space: nowrap; margin-right: 10px; }
        .form-input { flex-grow: 1; border-bottom: 1px dashed #000; height: 20px; min-width: 50px; }
        
        .form-grid { display: flex; gap: 20px; margin-bottom: 12px; }
        .form-grid .form-row { flex: 1; margin-bottom: 0; }

        .marks-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: auto;
            margin-bottom: 15px;
            table-layout: fixed; 
            word-wrap: break-word; 
        }
        .marks-table th, .marks-table td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        .marks-table th { 
            background-color: #fce4ec;
            color: #000;
            font-weight: bold;
        }

        .signatures { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 25px; 
        }
        .sign-box {
            text-align: center;
            width: 160px;
            border-top: 1px dashed #000;
            padding-top: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .warning-text {
            color: #d32f2f;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }

        @media screen and (max-width: 650px) {
            .header-flex { flex-direction: column; align-items: center; text-align: center; }
            .header-left { text-align: center; margin-bottom: 15px; }
            .form-grid { flex-direction: column; gap: 12px; }
            .signatures { flex-direction: column; align-items: center; gap: 30px; }
            .cut-line span { font-size: 11px; padding: 0 5px; }
            .white-box { padding: 15px; }
            .marks-table th, .marks-table td { padding: 4px; font-size: 11px; }
        }

        /* ================= PRINT SETTINGS (এখান থেকেই মূলত ফিক্স করা হয়েছে) ================= */
        @page {
            size: A4;
            margin: 0; /* ব্রাউজারের ডিফল্ট হেডার/ফুটার ও মার্জিন রিমুভ করা হয়েছে */
        }
        
        @media print {
            body { background-color: white; padding: 0; margin: 0; }
            .print-controls { display: none !important; }
            
            .a4-page { 
                box-shadow: none; 
                border: none; 
                width: 100% !important; 
                height: 290mm !important; /* ফিক্সড হাইট, যাতে পরের পেজে না যায় */
                min-height: 290mm !important; 
                max-width: none; 
                margin: 0;
                padding: 5mm; /* পেজের চারপাশে ৫ মি.মি. ফাঁকা জায়গা থাকবে যাতে প্রিন্টারে না কাটে */
                page-break-after: always;
                page-break-inside: avoid;
                box-sizing: border-box;
            }
            .header-flex { flex-direction: row; text-align: left; align-items: flex-start; }
            .header-left { text-align: left; margin-bottom: 0; }
            .form-grid { flex-direction: row; gap: 20px; }
            .signatures { flex-direction: row; gap: 0; }
            .cut-line span { font-size: 14px; padding: 0 15px; }
            .marks-table th, .marks-table td { font-size: 14px; padding: 8px; }

            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <!-- Print Setup Box -->
    <div class="print-controls">
        <h3>মাল্টিপল কপি জেনারেটর</h3>
        <label for="copyCount">কপি সংখ্যা:</label>
        <input type="number" id="copyCount" value="1" min="1" max="1000">
        <button onclick="generatePages()">পেজ তৈরি করুন</button>
        <button onclick="window.print()" style="background-color: #1976d2;">প্রিন্ট করুন (Ctrl+P)</button>
        <p style="font-size: 13px; color: #555; margin-top: 10px;">প্রথমে পেজ তৈরি করুন বাটনে ক্লিক করুন। এরপর প্রিন্ট কমান্ড দিন।</p>
    </div>

    <!-- Container where all pages will be generated -->
    <div id="print-container"></div>

    <!-- TEMPLATE: This remains hidden and is used to generate new pages -->
    <template id="page-template">
        <div class="a4-page">
            <!-- PART 1 -->
            <div class="part-1">
                <div class="white-box">
                    <div class="header-flex">
                        <div class="header-left">
                            <h1>MATH LAB</h1>
                            <h1>বার্ষিক পরীক্ষা - ২০২৬</h1>
                            <div style="font-size: 14px; margin-top: 5px;">শিক্ষার্থীর তথ্য অংশ (ছিঁড়ে রাখা হবে)</div>
                        </div>
                        <div class="secret-code">
                            <div class="secret-code-title">গোপন নম্বর (Secret Code)</div>
                            <div class="auto-code-display code-top">0000000000</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-label">শিক্ষার্থীর নাম :</div>
                        <div class="form-input"></div>
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-row">
                            <div class="form-label">রোল নম্বর :</div>
                            <div class="form-input"></div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-row">
                            <div class="form-label">শ্রেণি / বর্ষ :</div>
                            <div class="form-input"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-label">বিষয় কোড :</div>
                            <div class="form-input"></div>
                        </div>
                    </div>

                    <div class="signatures">
                        <div class="sign-box">কক্ষ পরিদর্শকের স্বাক্ষর</div>
                    </div>
                </div>
            </div>

            <!-- CUTTING LINE -->
            <div class="cut-line">
                <span>✂ - - - এখান থেকে ছিঁড়ে কন্ট্রোল রুমে জমা দিন - - - ✂</span>
            </div>

            <!-- PART 2 -->
            <div class="part-2">
                <div class="white-box">
                    <div class="header-flex">
                        <div class="header-left">
                            <span class="badge badge-red">পরীক্ষকের অংশ (মূল খাতা)</span>
                            <h1>বার্ষিক পরীক্ষা  - ২০২৬</h1>
                        </div>
                        <div class="secret-code">
                            <div class="secret-code-title">গোপন নম্বর (Secret Code)</div>
                            <div class="auto-code-display code-bottom">0000000000</div>
                        </div>
                    </div>

                    <div class="warning-text">
                        সতর্কতা: এই অংশে শিক্ষার্থীর নাম, রোল বা সাংকেতিক কিছু লেখা সম্পূর্ণ নিষেধ।
                    </div>

                    <div class="form-row">
                        <div class="form-label">বিষয়ের নাম :</div>
                        <div class="form-input"></div>
                    </div>
                    <div class="form-row">
                    <div class="form-label">  শ্রেণি/বর্ষ :</div>
                    <div class="form-input"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-label">পরীক্ষার তারিখ :</div>
                        <div class="form-input"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-label">অতিরিক্ত লুজ শিট :</div>
                        <div class="form-input"></div>
                    </div>

                    <table class="marks-table">
                        <tr>
                            <th colspan="4">শুধুমাত্র পরীক্ষকের ব্যবহারের জন্য</th>
                        </tr>
                        <tr>
                            <td style="width: 25%;">তত্ত্বীয় (Written)</td>
                            <td style="width: 25%;">বহুনির্বাচনী(MCQ)</td>
                            <td style="width: 25%;">ব্যবহারিক</td>
                            <td style="width: 25%;">সর্বমোট প্রাপ্ত নম্বর</td>
                        </tr>
                        <tr>
                            <td style="height: 60px;"></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </table>

                    <div class="signatures">
                        <div class="sign-box">নিরীক্ষকের স্বাক্ষর</div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        // Function to generate a random 10-digit code
        function generateRandomCode() {
            const min = 1000000000;
            const max = 9999999999;
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            return randomNum.toString();
        }

        // Function to generate multiple pages based on user input
        function generatePages() {
            const copyCount = document.getElementById('copyCount').value;
            const container = document.getElementById('print-container');
            const template = document.getElementById('page-template');
            
            // Clear existing pages if any
            container.innerHTML = ''; 

            if (copyCount > 1000) {
                alert("ব্রাউজার হ্যাং হওয়া এড়াতে একসাথে ১০০০ কপির বেশি তৈরি করবেন না।");
                return;
            }

            // Loop to create pages
            for (let i = 0; i < copyCount; i++) {
                const clone = template.content.cloneNode(true);
                const newCode = generateRandomCode();
                
                // Set the unique code for both top and bottom of this specific page
                clone.querySelector('.code-top').innerText = newCode;
                clone.querySelector('.code-bottom').innerText = newCode;
                
                container.appendChild(clone);
            }
            
            // alert(copyCount + " টি পেজ সফলভাবে তৈরি হয়েছে! এবার 'প্রিন্ট করুন' বাটনে ক্লিক করুন।");
        }

        // Generate 1 page by default when the page loads
        window.onload = function() {
            document.getElementById('copyCount').value = 1;
            generatePages();
            document.getElementById('copyCount').value = 500; // Set default back to 500 for user convenience
        };
    </script>
</body>
</html>
