<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল তৈরির জন্য নম্বর ইনপুট</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
        button {
            width: 48%;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        #submitBtn {
            background-color: #27ae60;
            color: white;
        }
        #submitBtn:hover {
            background-color: #219150;
        }
        #printBtn {
            background-color: #2980b9;
            color: white;
        }
        #printBtn:hover {
            background-color: #2471a3;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .message {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            display: none;
        }
        .copyright {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #7f8c8d;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }
        
        /* প্রিন্ট করার সময় বাটন ও স্টাইল হাইড করার জন্য */
        @media print {
            body { background-color: white; padding: 0; display: block; }
            .form-container { box-shadow: none; padding: 10px; margin: 0 auto; }
            .btn-container, button { display: none !important; }
            .form-group input { border: none; border-bottom: 1px dashed #000; border-radius: 0; padding: 5px 0; }
            .message { display: none !important; }
            .copyright { color: #000; border-top: 1px dashed #000; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ফলাফল তৈরির জন্য নম্বর ইনপুট</h2>
    <form name="submit-to-google-sheet">
        <div class="form-group">
            <label>শিক্ষার্থীর নাম</label>
            <input type="text" name="studentName" placeholder="যেমন: Rakib" oninput="this.value = this.value.toLowerCase().replace(/\b\w/g, c => c.toUpperCase())" required>
        </div>
        <div class="form-group">
            <label>ক্লাস</label>
            <input type="text" name="className" placeholder="যেমন: 10" oninput="this.value = this.value.toUpperCase()" required>
        </div>
        <div class="form-group">
            <label>আইডি</label>
            <input type="text" name="studentId" placeholder="যেমন: MATH7678" oninput="this.value = this.value.toUpperCase()" required>
        </div>
        <div class="form-group">
            <label>মোট নম্বর</label>
            <input type="number" name="totalMarks" placeholder="যেমন: 50" required>
        </div>
        <div class="form-group">
            <label>প্রাপ্ত নাম্বার</label>
            <input type="number" name="obtainMarks" placeholder="যেমন: 48" required>
        </div>
        <div class="form-group">
           <label>ফলাফল (Pass/Fail)</label>
           <input type="text" name="result" placeholder="যেমন: PASS" oninput="this.value = this.value.toUpperCase()" required>   
        </div>
        
        <div class="btn-container">
            <button type="submit" id="submitBtn">জমা দিন</button>
            <button type="button" id="printBtn" onclick="window.print()">প্রিন্ট করুন (PDF)</button>
        </div>
    </form>
    
    <div class="message" id="successMsg">তথ্য সফলভাবে জমা হয়েছে!</div>
    
    <div class="copyright">
        <p style="margin: 0; font-weight: bold;">&copy; 2026 Mahmudul Hasan | সর্বস্বত্ব সংরক্ষিত</p>
    </div>
</div>

<script>
  // আপনার দেওয়া নতুন লিংকটি এখানে বসানো হয়েছে
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxhCeStsckMmzMJRvW9YOtr64Ba2GFbZWvsRA_bUCs3RT0TDoP7tU3W1GtmmKqtXyelIw/exec'; 
  
  const form = document.forms['submit-to-google-sheet'];
  const successMsg = document.getElementById('successMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', e => {
    e.preventDefault(); 
    
    submitBtn.innerText = "জমা হচ্ছে..."; 
    submitBtn.disabled = true;

    // mode: 'no-cors' যুক্ত করা হয়েছে যাতে ব্রাউজার ব্লক না করে
    fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
      .then(response => {
        successMsg.style.display = "block";
        form.reset(); 
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert("দুঃখিত, তথ্য জমা দেওয়া যায়নি। দয়া করে আবার চেষ্টা করুন।");
      })
      .finally(() => {
        submitBtn.innerText = "জমা দিন";
        submitBtn.disabled = false;
        // ৩ সেকেন্ড পর সাকসেস মেসেজ গায়েব হয়ে যাবে
        setTimeout(function(){ successMsg.style.display = "none"; }, 3000); 
      });
  });
</script>

</body>
</html>
