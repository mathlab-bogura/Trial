<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফলাফল তৈরির জন্য নম্বর ইনপুট</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: block;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin: 40px auto;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            width: 47%;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            margin: 0 5px;
        }
        #submitBtn {
            background-color: #28a745;
            color: white;
        }
        #submitBtn:hover {
            background-color: #218838;
        }
        #printBtn {
            background-color: #007bff;
            color: white;
        }
        #printBtn:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: green;
            display: none;
        }
        .copyright {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 10px;
            font-style: italic;
        }
        
        /* প্রিন্ট করার সময় এই CSS কাজ করবে (PDF এর জন্য) */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .form-container {
                box-shadow: none;
                margin: 0 auto;
                padding: 10px;
                width: 100%;
            }
            /* প্রিন্ট কপিতে বাটনগুলো দেখাবে না */
            .btn-container, button {
                display: none !important;
            }
            /* ইনপুট বক্সের বর্ডার তুলে দিয়ে নিচে দাগ দেখাবে */
            .form-group input {
                border: none;
                border-bottom: 1px dashed #000;
                border-radius: 0;
                padding: 5px 0;
                background: transparent;
            }
            .message {
                display: none !important;
            }
            .copyright {
                border-top: 1px dashed #000;
                color: #000;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ফলাফল তৈরির জন্য নম্বর ইনপুট</h2>
    <form name="submit-to-google-sheet">
        <div class="form-group">
            <label>শিক্ষার্থীর নাম</label>
            <input type="text" name="postName" placeholder="যেমন: Rakib"  oninput="this.value = this.value.toLowerCase().replace(/\b\w/g, c => c.toUpperCase())" required>
        </div>
        <div class="form-group">
            <label>ক্লাস</label>
            <input type="text" name="idCv" placeholder="ক্লাস " oninput="this.value = this.value.toUpperCase()" required>
        </div>
        <div class="form-group">
            <label>আইডি</label>
            <input type="text" name="trackingId" placeholder="আইডি" oninput="this.value = this.value.toUpperCase()" required>
        </div>
        <div class="form-group">
            <label>মোট নম্বর</label>
            <input type="text" name="postCount" placeholder="যেমন: 05" required>
        </div>
        <div class="form-group">
            <label>প্রাপ্ত নাম্বার</label>
            <input type="text" name="mobileNo" placeholder="যেমন: 17" required>
           <label>Pass/Fail</label>
           <input type="text" name="idCv" placeholder="Pass/Fail " oninput="this.value = this.value.toUpperCase()" required>   
        </div>
        
        <div class="btn-container">
            <button type="submit" id="submitBtn">জমা দিন</button>
            <button type="button" id="printBtn" onclick="window.print()">প্রিন্ট করুন (PDF)</button>
        </div>
    </form>
    
    <div class="message" id="successMsg">তথ্য স্বয়ংক্রিয়ভাবে তথ্য জমা হয়েছে!</div>
    <!-- মেধা স্বত্ব (Copyright) সেকশন -->
<div style="text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; color: #444; border-top: 1px solid #ddd; padding-top: 20px; margin-top: 40px; font-size: 13px;">
    <p style="margin: 0; font-weight: bold; color: #2c3e50;">
        &copy; 2026 Mahmudul Hasan | সর্বস্বত্ব সংরক্ষিত
    </p>
    
</div>
    
</div>

<script>
  // এখানে আপনার Apps Script থেকে পাওয়া Web App URL-টি বসান
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwtA7CT8wuQXLBv6VauZfC8gyNKe1CPIn0jNUP1GvlEe7tIWvIrPiLUl9hYAodEscAX/exec'; 
  
  const form = document.forms['submit-to-google-sheet'];
  const successMsg = document.getElementById('successMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', e => {
    e.preventDefault(); 
    
    submitBtn.innerText = "জমা হচ্ছে..."; 
    submitBtn.disabled = true;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        successMsg.style.display = "block";
        form.reset(); 
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert("দুঃখিত, তথ্য জমা দেওয়া যায়নি।");
      })
      .finally(() => {
        submitBtn.innerText = "জমা দিন";
        submitBtn.disabled = false;
        setTimeout(function(){ successMsg.style.display = "none"; }, 3000); 
      });
  });
</script>

</body>
